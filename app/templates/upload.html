<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subir Excel</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">

        <h3 class="mb-3">Carga de Excel</h3>

        <form id="formUpload">
            <input type="file" name="file" class="form-control mb-3" required>
            <button class="btn btn-primary">Subir y Procesar</button>
        </form>

        <div id="resultado" class="mt-3"></div>

    </div>
</div>

<script>
document.getElementById("formUpload").addEventListener("submit", async function(e){
    e.preventDefault();

    const formData = new FormData(this);

    const response = await fetch("/upload", {
        method: "POST",
        body: formData
    });

    const data = await response.json();

    document.getElementById("resultado").innerHTML =
        `<div class="alert alert-success">
            Empresas nuevas: ${data.empresas_nuevas} <br>
            Procesos insertados: ${data.procesos_insertados}
        </div>`;
});
</script>

</body>
</html>
